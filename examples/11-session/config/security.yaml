firewalls:
  main:
    pattern: "^/"
    auth:
      cookie:
        name: "SESSION_ID"

access:
  - path: /login
    require: IS_AUTHENTICATED_ANONYMOUSLY
  - path: /*
    require: AUTH_REQUIRED

session:
  cookie: "SESSION_ID"
  cookie_path: "/"
  expires: 3600
  secure: true
  allow_reclaim: false
